  {n:"Window Paintings",t:"Use washable paint directly on the windows",w:"Painting on glass is different from painting on paper — the light comes through, colors mix in layers, and the results look almost like stained glass. Plus, the window is right there, ready to use.",s:["Get washable window paint or thick tempera","Let each person claim a window pane or section","Paint freely — landscapes, patterns, messages, portraits","Photograph before washing off (usually just soap and water)"],n2:["Washable window paint or tempera","Paintbrushes","A window","Soap and water for cleanup"],tip:"Paint on the inside, looking out — the view through your paintings in daylight is unexpectedly beautiful.",e:"medium",twist:"Theme the windows seasonally and repaint them 4 times a year — a rotating gallery.",tags:{loc:["inside"],ages:["toddler","young","tween"],mood:["silly","learning"],time:["30-45 minutes","1 hour"],budget:["free","small"],weather:["any"]}},
  {n:"Slow Cooking Day",t:"Start something in the slow cooker in the morning and eat it that night",w:"The anticipation of something good — smelling it all day, knowing it's coming — is itself a form of happiness. A slow-cooker family meal teaches that some good things require patience.",s:["Pick a slow cooker recipe together the night before","Prep and assemble it in the morning together","Go about your day — the house fills with smell as hours pass","Eat it together at dinner with genuine pride in your patience"],n2:["A slow cooker","Ingredients for chosen recipe","A whole day of anticipation"],tip:"Let kids be responsible for checking on it — lifting the lid, smelling it, giving the progress report.",e:"low",twist:"Make it a bread day too — no-knead bread that rises all day and bakes at dinner time.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["2+ hours"],budget:["small","free"],weather:["any"]}},
];



// ═══ SPLURGE — AMUSEMENT & ATTRACTIONS ═══
  {n:"Theme Park Day",t:"Roller coasters, rides, and pure family chaos",w:"A theme park day is one of those experiences that becomes family mythology — the ride that was too scary, the food that was too expensive, the photo that captured everyone mid-scream. It's worth it.",s:["Plan the day in advance: buy tickets online (cheaper), arrive early, map must-do rides","Let each person pick one non-negotiable ride or attraction","Build in downtime — overscheduling ruins it","End with something everyone loves: parade, fireworks, or one last ride"],n2:["Tickets (buy online for savings)","Comfortable shoes","Sunscreen and water","Cash for extras"],tip:"Let go of efficiency. The best theme park days are slow and wandering, not optimized.",e:"high",richType:"splurge",searchQuery:"theme park family",twist:"Do a 'ride rating' scorecard — everyone rates each ride on 3 criteria.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["silly","active"],time:["2+ hours"],budget:["splurge"],weather:["clear","warm"]}},
  {n:"Water Park Adventure",t:"Slides, waves, and chlorine — the full summer experience",w:"Water parks are one of the great equalizers — everyone looks equally ridiculous in a tube, everyone screams at the same drop, everyone's happy at the bottom.",s:["Arrive early — lines build fast after 11am","Let kids pick 3 must-do slides each","Build in lazy river time — underrated, deeply relaxing","End with wave pool for everyone together"],n2:["Tickets (check for family packages)","Sunscreen — lots","Water shoes","Towels and dry clothes for after"],tip:"Do the scariest slide first, together. The shared adrenaline bonds you for the whole day.",e:"high",richType:"splurge",searchQuery:"water park family",twist:"Rate every slide: scariness, splashiness, and line-wait-to-fun ratio.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["active","silly"],time:["2+ hours"],budget:["splurge"],weather:["hot","warm"],season:["summer"]}},
  {n:"Zoo Day",t:"See creatures from every corner of the planet",w:"A good zoo visit teaches kids that the world is enormous and strange and alive in ways they'd never otherwise encounter. The animal that really gets them is always unexpected.",s:["Check feeding times and special programs before you go","Let kids lead — follow their curiosity, not the map","Find one animal to really study: read the sign, watch it move, ask questions","Visit the gift shop last — kids remember the animal, not the stuffed animal"],n2:["Tickets (look for membership deals)","Comfortable shoes","Water and snacks","A camera for animal photos"],tip:"Ask 'what would it feel like to be this animal?' at each exhibit. The answers are always fascinating.",e:"medium",richType:"splurge",searchQuery:"zoo family",twist:"Each person picks their spirit animal and explains why.",tags:{loc:["outside"],ages:["toddler","young","tween","teen"],mood:["learning","calm"],time:["2+ hours"],budget:["splurge","moderate"],weather:["clear","cloudy"]}},
  {n:"Aquarium Visit",t:"The underwater world, right in front of you",w:"Aquariums create a specific kind of wonder — the slow movement of large creatures behind glass, the alien beauty of coral, the way everything moves differently underwater. It's meditative and exciting at once.",s:["Time your visit around feeding shows or jellyfish exhibits","Spend the most time at the largest tanks — the effect is cumulative","Touch tanks are worth the wait — the texture of a ray is unforgettable","Look up one creature at home afterward and go deeper"],n2:["Tickets","Comfortable shoes","Camera or phone for photos"],tip:"Sit in front of the biggest tank for 10 full minutes without moving. Something will come to you.",e:"low",richType:"splurge",searchQuery:"aquarium family",twist:"Each person picks their favorite creature and makes the case for why it's the most interesting.",tags:{loc:["inside"],ages:["toddler","young","tween","teen"],mood:["calm","learning"],time:["2+ hours"],budget:["splurge","moderate"],weather:["any"]}},
  {n:"Natural History Museum",t:"Dinosaurs, ancient humans, and the deep past",w:"A natural history museum makes the scale of time tangible — kids can look at an actual T. rex skeleton and understand, viscerally, that enormous creatures lived and died on this planet long before us.",s:["Focus on 3 areas max — trying to see everything kills everything","Find the biggest dinosaur skeleton and just stand under it for a moment","Look for interactive exhibits and hands-on areas for younger kids","Stop at the museum café — museum cafés always feel special"],n2:["Tickets (many museums are free or donation-based)","Comfortable shoes","A notebook for sketching cool things"],tip:"Ask kids to pick one artifact or exhibit to 'teach you about' — it reverses the role and deepens their engagement.",e:"low",richType:"splurge",searchQuery:"natural history museum family",twist:"Each person picks one object they'd steal if they could, and explains why.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["learning","calm"],time:["2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Science Museum",t:"Hands-on experiments and real scientific wonder",w:"Science museums are designed for curiosity — every exhibit asks you to touch, try, and discover. It's the right environment for letting kids lead while learning happens invisibly.",s:["Let kids run the agenda — follow what excites them","Try every interactive exhibit at least once","Find the planetarium or IMAX show if there is one","Buy one thing from the gift shop that extends the learning: a kit, a book"],n2:["Tickets","Curiosity","Comfortable shoes","Cash for gift shop"],tip:"Sit with genuine wonder, not teacherly explanation. 'I don't know how that works — let's figure it out together' is the best thing you can say.",e:"medium",richType:"splurge",searchQuery:"science museum children's museum family",twist:"Each person picks the one exhibit they'd take home and explains what they'd do with it.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["learning","silly"],time:["2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Children's Museum",t:"Designed for exactly this — play and discovery together",w:"Children's museums are one of the great inventions for family connection — every exhibit is collaborative, physical, and designed to spark the kind of play that generates real conversation.",s:["Arrive early — it fills up fast","Follow toddler/young kid energy completely — they know what they're doing","Look for the building, construction, and water play areas first","Stay longer than you think you need to"],n2:["Tickets (memberships often pay for themselves in 2 visits)","Comfortable clothes that can get messy","Water bottle"],tip:"Get on the floor with them. The difference between watching from above and playing at their level is enormous.",e:"medium",richType:"splurge",searchQuery:"children's museum family",twist:"Let each child be the 'guide' for 15 minutes — you follow their tour.",tags:{loc:["inside"],ages:["toddler","young","tween"],mood:["active","learning"],time:["2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Movie Theater Outing",t:"Big screen, popcorn, shared experience",w:"There's something about a dark room, a huge screen, and the communal experience of being surprised and delighted at the same moment that home streaming just doesn't replicate.",s:["Let kids pick the movie — trust their taste","Arrive early enough for trailers — part of the ritual","Get the popcorn: this is not the day to skip it","Talk about the movie on the way home — first impressions, before the internet tells you what to think"],n2:["Tickets (matinees are significantly cheaper)","Popcorn budget","Time for the full experience"],tip:"Ask one question on the way out: 'What was the moment you felt most?'",e:"low",richType:"splurge",searchQuery:"movie theater showtimes family",twist:"Write your own review of the film on the way home — star rating, one line each.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["calm","silly"],time:["2+ hours"],budget:["small","moderate"],weather:["any"]}},
  {n:"Live Theater or Musical",t:"The magic of live performance — nothing recorded about it",w:"Live theater does something to a child that nothing else does: it shows them that storytelling is something real humans do, in real time, for real audiences. The electricity of that is lasting.",s:["Choose age-appropriate — most cities have family productions of classics","Explain what to expect before you go: live actors, no pausing, real applause","Let them get dressed up slightly — the ritual matters","Discuss backstage: how does the set move? How do the actors remember all those words?"],n2:["Tickets (look for family matinees — much cheaper)","Slightly nicer clothes","Curiosity about how it's made"],tip:"Look up one thing about the show before you go — history of the story, a song, what it's about. Preparation doubles the experience.",e:"low",richType:"splurge",searchQuery:"family theater musical show",twist:"Rate the performance: acting, sets, costumes, music — each person picks their MVP.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["2+ hours"],budget:["splurge","moderate"],weather:["any"]}},
  {n:"Live Concert",t:"Music experienced in the same room as the musicians",w:"Live music is one of the most primal human experiences. Feeling bass through your chest, seeing real musicians, being in a crowd that's all feeling the same thing — it rewires how kids hear music forever.",s:["Choose carefully: outdoor family concerts, symphony kid programs, or a band they love","Prepare them for the experience: it'll be loud, there will be a crowd, and that's wonderful","Find the song you all know and plan to go wild during it","Talk about what it would take to perform like that — the work behind what looks effortless"],n2:["Tickets","Ear protection for small kids","Cash for merchandise if they want a keepsake"],tip:"Watch your kid's face during their favorite song. That expression is worth the ticket price alone.",e:"medium",richType:"splurge",searchQuery:"family concert live music events",twist:"Each person picks their favorite moment from the show and describes it in detail.",tags:{loc:["outside","inside"],ages:["young","tween","teen"],mood:["active","silly"],time:["2+ hours"],budget:["splurge","moderate"],weather:["any"]}},
  {n:"Pro Sports Game",t:"The crowd, the players, the snacks, the whole thing",w:"A live sporting event is about more than the sport — it's about the collective experience of thousands of people caring about the same thing at the same moment. Kids absorb that electricity deeply.",s:["Get tickets in advance — even upper deck is incredible live","Arrive early to watch warm-ups and soak in the atmosphere","Explain the game as it happens — make it a teaching moment if needed","Get one overpriced stadium food item: it's part of the ritual"],n2:["Tickets","Team gear or colors if you have them","Cash for stadium food","A full understanding that parking will be terrible"],tip:"Don't watch the scoreboard — watch your kid watching the game. Their face is the whole point.",e:"medium",richType:"splurge",searchQuery:"sports game tickets family",twist:"Each person makes a score prediction before the game — winner picks dinner.",tags:{loc:["outside","inside"],ages:["young","tween","teen"],mood:["active","silly"],time:["2+ hours"],budget:["splurge","moderate"],weather:["any"]}},
  {n:"Minor League Baseball Game",t:"Affordable, intimate, and genuinely fun",w:"Minor league baseball has everything that makes the sport great, without the corporate scale that makes major league parks overwhelming. The players are close, the prices are reasonable, and the atmosphere is perfect for families.",s:["Look up your nearest minor league team — most cities have one","Arrive early for batting practice — you can often get close","Get peanuts or Cracker Jacks: non-negotiable ritual","Stay for the full game — endings are always worth it"],n2:["Tickets (often very affordable)","Snack budget","Baseball gloves if you want to try to catch a foul ball"],tip:"Tell them about the first game you ever went to. Connecting your memory to their experience is its own kind of gift.",e:"medium",richType:"splurge",searchQuery:"minor league baseball family",twist:"Invent a player and narrate their fake backstory during the game.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["calm","silly"],time:["2+ hours"],budget:["moderate","small"],weather:["clear","warm"]}},
  // ═══ SPLURGE — ACTIVE ATTRACTIONS ═══
  {n:"Real Escape Room",t:"60 minutes, locked in, work together or stay forever",w:"A real escape room is one of the best family teamwork tests there is — everyone's skills matter, everyone must communicate, and the time pressure creates real stakes. Solving it together is unforgettable.",s:["Book in advance — choose a difficulty appropriate for your youngest","Assign roles naturally: one reader, one solver, one communicator","Talk through every clue out loud — no silent solo solving","Celebrate every small win together"],n2:["Booking reservation","30 minutes early arrival recommended","A team mindset"],tip:"Avoid letting one person take over. The rooms are designed so that distributed thinking beats one genius.",e:"medium",richType:"splurge",searchQuery:"escape room family",twist:"Debrief after: which clue was hardest? Who solved the most important one?",tags:{loc:["inside"],ages:["tween","teen"],mood:["learning","silly"],time:["1 hour","2+ hours"],budget:["splurge","moderate"],weather:["any"]}},
  {n:"Rock Climbing Gym",t:"Vertical problem-solving with real stakes",w:"Rock climbing teaches kids that their body is capable of things their mind initially refuses. The first time they top out on a wall, they look back down with an expression that's worth everything.",s:["Book an intro lesson or call ahead for first-timer advice","Start with the bouldering wall (no ropes, shorter) to build confidence","Spot each other, cheer each other, celebrate every top-out","Rest between attempts — it's more physical than it looks"],n2:["Day pass + shoe rental","Comfortable clothes that move","Water","Optional: chalk for grip"],tip:"Climb yourself — on the same wall, starting from the same zero. Shared struggle is the connection.",e:"high",richType:"splurge",searchQuery:"rock climbing gym family kids",twist:"Each person picks one route to 'own' and works it until they top it.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["active","learning"],time:["1 hour","2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Indoor Skydiving",t:"Wind tunnel flight — zero altitude, maximum fun",w:"Indoor skydiving produces a feeling of complete weightlessness that kids describe for years. The shared absurdity of floating in a tube, limbs everywhere, turns everyone into equals.",s:["Book in advance — usually done in 2-minute sessions","Watch the training video carefully — the technique matters","Help each other remember the hand signals during flight","Film it: the footage is always hilarious and often graceful"],n2:["Booking reservation","Comfortable clothes (no loose items)","Someone to film the outside"],tip:"Go in expecting to look ridiculous. The abandon you model gives them full permission.",e:"high",richType:"splurge",searchQuery:"indoor skydiving family",twist:"Rate each other's 'form' on a 10-point scale — categories: style, control, facial expression.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["active","silly"],time:["1 hour"],budget:["splurge"],weather:["any"]}},
  {n:"Go-Kart Racing",t:"Helmets on, pedal down, sibling rivalry activated",w:"Go-karts create a rare dynamic where kids can legitimately beat you — and they know it. The ego-leveling of a real race, combined with genuine speed, produces lasting memories.",s:["Check minimum age/height — varies by location","Do one warm-up lap to learn the track","Race for real — no holding back, it's more fun that way","Debrief: racing lines, what worked, grudge rematch"],n2:["Booking or tokens","Closed-toe shoes required","No loose clothing or accessories"],tip:"Let them beat you fair and square if they do — and make it obvious that you tried.",e:"high",richType:"splurge",searchQuery:"go kart racing family",twist:"Use racing team names and take the podium photo very seriously.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["active","silly"],time:["1 hour","2+ hours"],budget:["moderate","splurge"],weather:["clear","cloudy"]}},
  {n:"Trampoline Park",t:"Bounce, flip, slam — physics made fun",w:"Trampoline parks produce a specific kind of shared physical joy that's hard to replicate — everyone looks equally ridiculous mid-bounce, everyone lands wrong sometimes, everyone laughs.",s:["Check for foam pits and dodgeball courts — best areas","Arrive right when it opens — floors get crowded fast","Learn one new trick together: a seat drop, a small spin","Take turns watching each other and cheering specific moves"],n2:["Socks (required — buy there or bring grip socks)","Comfortable clothes","Water bottle"],tip:"Jump yourself, not just watch. Your willingness to look silly bouncing next to them is the whole gift.",e:"high",richType:"splurge",searchQuery:"trampoline park family",twist:"Foam pit cannonball competition — most dramatic landing wins.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["active","silly"],time:["1 hour","2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Laser Tag",t:"Strategic chaos in the dark",w:"Laser tag produces the rare experience of kids legitimately outperforming adults — the teenagers who run that game have spent 400 hours in there. Letting them be better at something is a gift.",s:["Go as a team — family vs. strangers — or play family vs. family","Develop simple team signals and a base strategy","Find the high ground and hold it — basic but effective","Debrief your strategy at the end: what worked?"],n2:["Tokens or session fee","Comfortable clothes","Dark colors (psychologically helpful)"],tip:"Take the loss gracefully and ask them to teach you what you did wrong.",e:"high",richType:"splurge",searchQuery:"laser tag family",twist:"Analyze your post-game score breakdown together — who had the best accuracy?",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["active","silly"],time:["1 hour"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Mini Golf",t:"18 holes of windmills, obstacles, and family drama",w:"Mini golf is one of the great family activities because skill barely matters — a wild lucky shot beats the careful strategist constantly. The luck equalizer makes everyone competitive.",s:["Let the youngest go first every hole — it builds confidence","Invent house rules: ridiculous putting stances, one-handed holes","Keep score seriously or not at all — pick a lane","Get ice cream after: it's the law"],n2:["Green fee","Clubs and ball (provided)","Score card and pencil"],tip:"Celebrate every hole-in-one dramatically, regardless of whose it is.",e:"medium",richType:"splurge",searchQuery:"mini golf family",twist:"Each person picks their 'signature hole' — the one they own. Trash talk encouraged.",tags:{loc:["outside"],ages:["toddler","young","tween","teen"],mood:["silly","active"],time:["1 hour","2+ hours"],budget:["moderate","small"],weather:["clear","cloudy","warm"]}},
  {n:"Bowling",t:"Strikes, gutter balls, and nachos — the classic",w:"Bowling is one of the great age-equalizers — bumpers or not, a toddler can get a strike and a competent adult can throw a gutter ball. The randomness is what makes it family-friendly.",s:["Get bumpers for the youngest — this is not about teaching them the hard way","Find your ball weight: heavier than you think for adults, lighter for kids","Bowl for keeps — keep score properly, it raises the stakes appropriately","Get the snacks: nachos and a pitcher of root beer is the move"],n2:["Lane fee and shoe rental","Snack budget","2-3 hours minimum"],tip:"Celebrate every pin, not just strikes. The toddler who gets 3 pins with both hands deserves the same energy.",e:"medium",richType:"splurge",searchQuery:"bowling alley family",twist:"Bowling names — everyone bowls under an alias. The Destroyer. Pink Lightning. The Professor.",tags:{loc:["inside"],ages:["toddler","young","tween","teen"],mood:["silly","active"],time:["1 hour","2+ hours"],budget:["moderate","small"],weather:["any"]}},
  {n:"Axe Throwing",t:"Extremely satisfying, surprisingly safe with instruction",w:"Axe throwing with your kids is one of those activities that seems unhinged until you do it — and then everyone is obsessed within 5 minutes. The focus it requires is almost meditative.",s:["Book with a facility that provides full instruction — non-negotiable","Learn the technique before throwing hard — form matters","Take turns coaching each other's stance and release","Set targets and compete: closest to the bullseye after 5 throws"],n2:["Booking reservation","Closed-toe shoes","Ages usually 10+ — check requirements"],tip:"Model being a beginner — your early throws will miss too, and that's the whole point.",e:"medium",richType:"splurge",searchQuery:"axe throwing family",twist:"Tournament bracket — single elimination, best of 5 throws per round.",tags:{loc:["inside"],ages:["tween","teen"],mood:["active","silly"],time:["1 hour","2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Archery Lesson",t:"Focus, form, and the satisfying thud of an arrow",w:"Archery requires exactly the kind of quiet, present focus that's hard to cultivate in kids by any other means. The moment of release and impact is profoundly satisfying.",s:["Book an intro lesson — technique is everything in archery","Learn to breathe before releasing — the breathing lesson transfers everywhere","Let each person find their dominant eye and set their stance","Compete: closest to center after 10 arrows each"],n2:["Booking or range fee","Equipment usually provided","Closed-toe shoes"],tip:"The archer who focuses on their breathing beats the archer who focuses on the target. That's a life lesson.",e:"low",richType:"splurge",searchQuery:"archery lesson family range",twist:"Design your family crest to paint on the target.",tags:{loc:["outside","inside"],ages:["young","tween","teen"],mood:["learning","calm"],time:["1 hour"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Kayaking or Canoeing",t:"Paddle together, argue productively, arrive somewhere beautiful",w:"A kayak or canoe requires genuine teamwork — when two people paddle against each other, you go nowhere. The learning curve of coordination creates the best kind of shared challenge.",s:["Rent kayaks or canoes at a local lake or river outfitter","For canoes: one person in front sets pace, one in back steers","Paddle to a destination — a small island, a quiet cove, a swimming spot","Drift and float for a while — the stillness is the point"],n2:["Rental fee","Life jackets (provided or required)","Waterproof bag for phone and valuables","Sunscreen"],tip:"Switch paddlers — put kids in the stern position for a leg. Steering is harder than it looks and they'll feel the responsibility.",e:"medium",richType:"splurge",searchQuery:"kayak canoe rental family",twist:"Navigation challenge: reach a specific point using only verbal directions.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["active","calm"],time:["2+ hours","1 hour"],budget:["moderate","splurge"],weather:["clear","cloudy","warm"]}},
  {n:"Horseback Riding",t:"A trail ride through somewhere beautiful",w:"Riding a horse is one of those experiences that sits completely outside of normal life — the size of the animal, the movement, the need to communicate with a creature that doesn't speak your language. It resets something.",s:["Book a guided trail ride — appropriate for beginners","Learn to communicate with the horse before mounting: calm voice, gentle hands","Trust the horse's pace — fighting it is exhausting for both of you","Pet and thank your horse at the end"],n2:["Booking reservation","Closed-toe shoes or boots required","Comfortable pants that won't chafe","Long sleeves recommended"],tip:"Narrate the landscape as you ride. The combination of movement, nature, and your voice telling them things is deeply connecting.",e:"medium",richType:"splurge",searchQuery:"horseback riding family trail",twist:"Name your horse and write its backstory during the ride.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["1 hour","2+ hours"],budget:["splurge","moderate"],weather:["clear","cloudy"]}},
  {n:"Hot Air Balloon Ride",t:"Float above everything — a once-in-a-lifetime view",w:"There is no experience quite like being hundreds of feet above the ground in complete silence, watching the world look like a map. It changes how kids see their own geography forever.",s:["Book well in advance — weather cancellations are common, choose a flexible provider","Arrive at dawn — balloon rides are morning activities","Watch the inflation: it's fascinating and takes 30-45 minutes","Float in silence for at least a few minutes — resist the urge to narrate everything"],n2:["Booking (usually months in advance)","Weather-appropriate layers — cold up there","Comfortable shoes","A camera but mostly just your eyes"],tip:"Identify your house from the air. The perspective shift of seeing your neighborhood from above changes how kids understand where they live.",e:"low",richType:"splurge",searchQuery:"hot air balloon ride family",twist:"Each person picks one thing they can see that they want to go back and explore on the ground.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["2+ hours"],budget:["splurge"],weather:["clear"],timeOfDay:["morning"]}},
  {n:"Zip Lining",t:"Launch off a platform and fly through the trees",w:"Zip lining asks kids to choose to be brave — to step off the platform even when their body is saying no. Watching them do it, and then hearing their scream turn to laughter, is one of the great parenting experiences.",s:["Choose a course appropriate for youngest — many have multiple lines of increasing difficulty","Watch each other launch and land — cheer loudly every single time","Let each person process their fear out loud — it's OK to be scared and do it anyway","Debrief at the bottom: hardest moment? Best view?"],n2:["Booking reservation","Closed-toe shoes required","Comfortable clothes","Follow all weight/age requirements"],tip:"If someone is scared, don't push — ask if they want to try and honor the answer either way. Respecting the fear matters more than completing the line.",e:"high",richType:"splurge",searchQuery:"zip line family outdoor adventure",twist:"Film each launch — the moment of departure is always priceless.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["active","silly"],time:["1 hour","2+ hours"],budget:["splurge","moderate"],weather:["clear","cloudy"]}},
  {n:"Surfing Lesson",t:"Stand up, fall down, stand up, repeat",w:"Learning to surf teaches kids that skill is built through repetition of failure, not through understanding. The ocean is the teacher and it has infinite patience. The first time they stand up, they'll scream.",s:["Book a beginner group lesson — instructors who work with kids are essential","Practice pop-ups on the beach before entering water","Celebrate every stand-up, however brief — even 1 second counts","End by just playing in the waves: boogie board, body surf, just swim"],n2:["Lesson booking","Board and wetsuit included in most lessons","Sunscreen — water intensifies UV","Rash guard recommended"],tip:"Get in the water yourself — even if you don't take the lesson. Watching you struggle and laugh from the shore is powerful.",e:"high",richType:"splurge",searchQuery:"surfing lesson family beginner",twist:"Name your wave style: the 'Classic Wipeout,' the 'One-Second Hero,' the 'Almost.'",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["active","silly"],time:["2+ hours"],budget:["splurge","moderate"],weather:["clear","warm"],season:["summer"]}},
  {n:"Ski or Snowboard Day",t:"Slopes, chairlifts, hot chocolate at the lodge",w:"A ski day with kids is a full-day commitment to something genuinely hard — and the shared difficulty of learning, falling, and improving is exactly the kind of bonding that stays. The lodge hot chocolate is its own reward.",s:["Get ski school for kids who've never skied — it's worth every penny","Ski at their pace and ability — this is not the day to push your own limits","Meet for lunch at the lodge: this refuel is essential","End before anyone hits their wall — leaving on a high note is the art"],n2:["Lift tickets and rentals (look for family packages)","Warm layers and waterproof pants","Helmet (required for kids at most resorts)","Sunscreen — altitude sun is fierce"],tip:"Ski the bunny hill with the youngest. Your patience on the easy run is a bigger gift than taking them somewhere too hard.",e:"high",richType:"splurge",searchQuery:"ski resort family day trip",twist:"Rate every run: 1-10 for fun, difficulty, and wipeout quality.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["active","silly"],time:["2+ hours"],budget:["splurge"],weather:["snowy","cold"],season:["winter"]}},
  // ═══ SPLURGE — FOOD EXPERIENCES ═══
  {n:"Cooking Class Together",t:"Learn from a real chef in a real kitchen",w:"Taking a cooking class together — being students together, following instructions, making something technical — produces a different dynamic than cooking at home. You're equals in the kitchen.",s:["Book a class appropriate for the ages — many studios offer family sessions","Take notes: write down the techniques, not just the recipe","Ask the chef questions — they love curious participants","Recreate the meal at home within a week while it's fresh"],n2:["Booking reservation","Comfortable clothes you don't mind getting messy","Note-taking materials"],tip:"Ask the chef what they'd do differently if they were cooking this just for themselves. The personal version is always more interesting.",e:"medium",richType:"splurge",searchQuery:"cooking class family kids",twist:"Give the meal a family name when you make it at home — 'Chef Mom's Thursday Risotto.'",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["learning","calm"],time:["2+ hours"],budget:["splurge","moderate"],weather:["any"]}},
  {n:"Food Tour",t:"Walk, taste, and discover your city through food",w:"A food tour gives you a completely different experience of a familiar city — you see it through the lens of its food culture, its immigrant history, its neighborhoods. Kids remember what they tasted.",s:["Book a guided tour if available — guides add context that makes food meaningful","Walk slowly between stops — the walking is as important as the eating","Order one extra dish to share at each stop — curiosity over caution","Ask at every stop: what's the story behind this dish?"],n2:["Booking or just a neighborhood to explore","Comfortable shoes","Cash and appetite","Flexible stomach"],tip:"Let kids pick one stop entirely based on what looks interesting to them. Their choice matters and usually surprises everyone.",e:"medium",richType:"splurge",searchQuery:"food tour family",twist:"Rate each stop: flavor, story, presentation. Name the winner.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["learning","calm"],time:["2+ hours"],budget:["moderate","splurge"],weather:["clear","cloudy"]}},
  {n:"Fancy Restaurant Night",t:"Dress up, order things you can't pronounce, be fancy",w:"Taking kids to a genuinely nice restaurant — and trusting them to rise to it — teaches them about care, attention, and the kind of experience that comes from craftsmanship. They always surprise you.",s:["Let kids pick something from the menu they've never tried","Explain how to read a menu and order — this is a skill","Notice together: the lighting, the table setting, the way food arrives","Talk slowly — this is not a fast meal"],n2:["Reservation (essential)","Nicer clothes — make getting dressed part of the experience","The willingness to spend more than you're comfortable with"],tip:"Order something adventurous yourself and let them try it. Your curiosity models exactly what you want from them.",e:"low",richType:"splurge",searchQuery:"nice family friendly restaurant",twist:"Write a fake Yelp review of the meal on the way home. Stars, description, verdict.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["calm"],time:["2+ hours"],budget:["splurge"],weather:["any"]}},
  {n:"Pottery Class",t:"Get clay-covered and make something real",w:"Throwing clay on a wheel — or even hand-building — produces a specific, focused absorption that's difficult to achieve anywhere else. The mess is part of it. The imperfect finished object is the point.",s:["Book a family pottery session — many studios offer them","Start with hand-building: coil pots or pinch pots are easier than wheel throwing","Don't aim for perfection — aim for something that holds something","Pick up your fired piece 1-2 weeks later: the reveal is always emotional"],n2:["Booking reservation","Clothes you don't mind getting dirty","$10-15 extra for glazing and firing"],tip:"Make something for each other — a bowl for their cereal, a mug for your coffee. The use carries the memory.",e:"medium",richType:"splurge",searchQuery:"pottery class family kids",twist:"Name your piece and write its story on the back before firing.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["2+ hours","1 hour"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Paint and Sip (Family Edition)",t:"Guided painting — everyone makes the same thing, somehow differently",w:"Paint-and-sip style classes for families strip away the fear of art by giving everyone the same starting point. The fact that everyone's finished painting looks completely different from the same instructions is the revelation.",s:["Book a family painting class — most studios offer them","Follow the instructor's technique, then add your own twist","Talk while you paint — the side-by-side focus loosens conversation naturally","Display all the paintings together: the comparison is always wonderful"],n2:["Booking reservation","Clothes you don't mind getting paint on","Optional: juice or hot chocolate for the kids"],tip:"Notice where their painting diverges from yours and asks: why did you do that? The answer always tells you something about how they see.",e:"low",richType:"splurge",searchQuery:"family painting class art studio",twist:"Reveal your paintings simultaneously — 3-2-1 hold them up.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Drive-In Movie",t:"The car is the theater — pajamas and snacks allowed",w:"Drive-in movies create a specific kind of family intimacy — you're in your own space, in your own car, surrounded by other families doing the exact same thing. It's communal and private at once.",s:["Find your nearest drive-in (surprisingly many still exist)","Arrive early for the best spot — arrive 45 minutes before showtime","Bring blankets, pillows, and all the snacks — the car is yours","Tune the radio to the station and experience the weird magic of movie audio through the car speakers"],n2:["Tickets (check if cash only)","Car full of blankets and pillows","All the snacks","Radio — some drive-ins use FM frequency for audio"],tip:"Bring something warm — it gets cold as the night goes on, and snuggling under a blanket watching a movie is the whole point.",e:"low",richType:"splurge",searchQuery:"drive in movie theater",twist:"Rate the experience: movie, snacks, setup, overall vibe.",tags:{loc:["outside"],ages:["young","tween","teen","toddler"],mood:["calm","silly"],time:["2+ hours"],budget:["small","moderate"],weather:["clear"],timeOfDay:["evening","night"],season:["summer","fall"]}},
  // ═══ SPLURGE — UNIQUE EXPERIENCES ═══
  {n:"Planetarium Show",t:"The full dome experience of the universe",w:"A good planetarium show does something that no screen at home can replicate — it puts the entire night sky overhead, at scale, with your kids sitting next to you in the dark. The scale makes something happen.",s:["Check the show schedule — choose age-appropriate content","Arrive early to look at the exhibits in the lobby","Lie back in the reclining seats and don't look at your phone","Talk after: what was the biggest thing you felt?"],n2:["Tickets","Comfortable clothes (you'll be lying back)","Curiosity"],tip:"Point out one constellation you can find from your backyard. The connection between the dome and the real sky matters.",e:"low",richType:"splurge",searchQuery:"planetarium show family",twist:"Each person picks one space fact they learned and has to explain it to someone at home.",tags:{loc:["inside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["1 hour","2+ hours"],budget:["moderate","small"],weather:["any"]}},
  {n:"Whale Watching Trip",t:"Take a boat out and look for something enormous",w:"Seeing a whale in the wild — the scale of it, the sudden appearance, the breath — produces a kind of awe that's genuinely hard to describe and impossible to forget. Do this if you're anywhere near the ocean.",s:["Book with a reputable naturalist tour — they know where to go","Dress warmer than you think — the ocean is cold even in summer","Stand at the bow for the best view and the best spray","Learn one fact about the whale species before you go — it deepens the encounter"],n2:["Tickets (book in advance)","Warm layers and waterproof jacket","Seasickness medication if needed","Binoculars if you have them"],tip:"When a whale surfaces, don't immediately photograph it. Watch it first. Five seconds of pure presence beats a blurry photo.",e:"medium",richType:"splurge",searchQuery:"whale watching tour family",twist:"Each person names the whale and gives it a backstory.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["calm","learning"],time:["2+ hours"],budget:["splurge","moderate"],weather:["clear","cloudy"],season:["spring","summer","fall"]}},
  {n:"Behind the Scenes Tour",t:"See how something is really made",w:"Kids who see the inside of how things are made — TV stations, factories, newspapers, museums — develop a completely different relationship to those things. The invisible labor becomes real.",s:["Look for factory tours, studio tours, newspaper tours, or museum behind-the-scenes in your area","Come with questions written down — guides love prepared visitors","Ask the workers what they love and what's hard about their job","Follow up: look at the thing you toured differently now"],n2:["Reservation (often required)","Questions prepared in advance","Camera (if allowed)"],tip:"Ask the workers: 'What do most people get wrong about how this is made?' Always gets a great answer.",e:"low",richType:"splurge",searchQuery:"factory tour behind the scenes family",twist:"Each person has to teach the tour to someone who wasn't there.",tags:{loc:["inside","outside"],ages:["young","tween","teen"],mood:["learning","calm"],time:["1 hour","2+ hours"],budget:["free","moderate"],weather:["any"]}},
  {n:"Comedy Club (Family Show)",t:"Laugh together at live comedy",w:"Live comedy — seeing a real comedian work a room, watching timing and improvisation — teaches kids something about presence, risk-taking, and the mechanics of humor that no recorded comedy can.",s:["Book a family-friendly show specifically — many clubs offer them","Sit where you can see the comedian's face","After: pick apart what made each joke work — setup, misdirection, timing","Try to tell one joke you thought up yourself on the way home"],n2:["Tickets","Ages vary by show — check in advance","A good sense of humor"],tip:"Talk about what made things funny and what didn't. Comedy analysis sounds dry but actually produces great conversation.",e:"low",richType:"splurge",searchQuery:"family comedy show family friendly",twist:"Each person has to tell one joke before bedtime — can be terrible.",tags:{loc:["inside"],ages:["tween","teen"],mood:["silly","calm"],time:["2+ hours"],budget:["moderate","splurge"],weather:["any"]}},
  {n:"Overnight Camping Trip",t:"Pack up and spend a real night in nature",w:"A single overnight camping trip produces more family stories than months of ordinary evenings. Something about sleeping outside, cooking on fire, and navigating the dark together changes the group.",s:["Book a campsite in advance — state parks are excellent and affordable","Pack light: you need less than you think","Cook dinner over the fire together — even something simple","Wake up with the birds and eat breakfast outside before anyone else is up"],n2:["Tent and sleeping bags","Campsite reservation","Cooking supplies: pots, utensils, fire starter","Headlamps for each person"],tip:"Disconnect completely — no data, no streaming. The first few hours feel strange; after that, everyone relaxes into the present.",e:"medium",richType:"splurge",searchQuery:"family campsite camping near me",twist:"No phones after dark — stargazing and stories only.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["calm","silly"],time:["2+ hours"],budget:["moderate","splurge"],weather:["clear"],season:["spring","summer","fall"]}},
  {n:"Snorkeling or Scuba Adventure",t:"Breathe underwater and see a completely different world",w:"The first time a child puts their face in the water with a snorkel and sees coral and fish, they're encountering a world they didn't know existed. That encounter changes how they think about the planet.",s:["Start with snorkeling — no certification needed","Find shallow reef areas for the best visibility","Agree on hand signals before entering the water","Go slowly — the slowest swimmer sees the most"],n2:["Rental equipment or guided tour with equipment","Rash guard and reef-safe sunscreen","Waterproof camera if possible","Swim confidence required"],tip:"Point things out underwater — tapping someone on the shoulder and pointing is the whole communication system. It creates a shared private language.",e:"medium",richType:"splurge",searchQuery:"snorkeling family beginner",twist:"Draw the most interesting thing you saw from memory when you get back.",tags:{loc:["outside"],ages:["young","tween","teen"],mood:["active","calm"],time:["1 hour","2+ hours"],budget:["moderate","splurge"],weather:["clear","hot"],season:["summer"]}},
  {n:"Spa Day (Family Edition)",t:"Real massages, treatments, total relaxation together",w:"Taking kids to a real spa — where the intention is rest and care — teaches them that bodies deserve attention and that relaxation is a skill worth developing. It's not indulgent; it's education.",s:["Book treatments appropriate for each age — many spas offer teen-specific options","Start with the relaxation pool or hydrotherapy if available","No phones in the spa area — enforce this lovingly but firmly","Eat lightly afterward and stay hydrated"],n2:["Booking reservation (research family-friendly spas)","Comfortable clothes for after","Cash for gratuity"],tip:"Ask each person what they noticed about their body during the treatment. The observation itself is the lesson.",e:"low",richType:"splurge",searchQuery:"family spa day kids teen",twist:"Design your own family spa menu — what treatments would your imaginary home spa offer?",tags:{loc:["inside"],ages:["tween","teen"],mood:["calm"],time:["2+ hours"],budget:["splurge"],weather:["any"]}},

  const guides={
    spring:{planets:"Jupiter is bright in the eastern sky in spring evenings. Mars may appear orange-red near the horizon.",constellations:["Leo (look for the backwards question mark shape)","Virgo (the second largest constellation)","Boötes (follow the Big Dipper's handle — it arcs to Arcturus)","Hydra (the longest constellation in the sky)","Corvus (small square of 4 stars)"]},
    summer:{planets:"Saturn rises in the south. Jupiter is brilliant in the east. If very dark, you can see the Milky Way band.",constellations:["Scorpius (follow the hook of stars — best in July/August)","Sagittarius (the 'teapot' — steam pours toward the Milky Way)","Cygnus/Northern Cross (high overhead)","Lyra (find bright blue Vega — the 5th brightest star)","Hercules (the 'keystone' pattern near Vega)"]},

    winter:{planets:"Venus often brilliant in the west after sunset. Jupiter sometimes visible.",constellations:["Orion (the most recognizable winter constellation — 3 belt stars)","Taurus (find the V-shape of the Hyades cluster, and orange Aldebaran)","Canis Major (follow Orion's belt down-left to brilliant Sirius — brightest star)","Gemini (Castor and Pollux — the twin stars)","Auriga (pentagon shape with bright yellow Capella)"]}

function scoreAct(a,form){
  let s=0; const t=a.tags;
  const ws=getWeatherState();
  const season=getSeason();
  const isWeekend=getIsWeekend();

  if(t.loc.includes(form.loc))s+=30;
  else if(t.loc.includes("inside")&&form.loc==="both")s+=15;
  else if(t.loc.includes("outside")&&form.loc==="both")s+=15;

  const ao=(t.ages||[]).filter(x=>form.ages.includes(x)).length;
  s+=ao*18;
  const mo=(t.mood||[]).filter(x=>form.mood.includes(x)).length;
  s+=mo*20;
  if((t.time||[]).includes(form.time))s+=15;

  const bmap={free:["free"],small:["free","small"],splurge:["free","small","moderate","splurge"],open:["free","small","moderate","splurge","open"]};
  if((bmap[form.budget]||bmap.open).some(b=>(t.budget||[]).includes(b)))s+=10;

  const tw=t.weather||["any"];
  if(tw.includes("any"))s+=5;
  else if(ws.isRaining&&tw.includes("rainy"))s+=25;
  else if(ws.isSnowing&&tw.includes("snowy"))s+=25;
  else if(ws.isHot&&tw.includes("hot"))s+=20;
  else if(ws.isWindy&&tw.includes("windy"))s+=15;
  else if(!ws.isRaining&&!ws.isSnowing&&tw.includes("clear"))s+=10;
  else if(!ws.isRaining&&!ws.isSnowing&&tw.includes("warm")&&!ws.isCold)s+=10;

  if(t.loc.includes("outside")&&!t.loc.includes("inside")){
    if(ws.isRaining&&!tw.includes("rainy"))s-=30;
    if(ws.isSnowing&&!tw.includes("snowy"))s-=20;
    if(ws.isCold&&!tw.includes("cold")&&!tw.includes("snowy"))s-=15;
  }

  if(t.season&&t.season.includes(season))s+=20;

  if(HOLIDAY&&t.holiday){
    if(HOLIDAY.toLowerCase().includes("halloween")&&t.holiday.includes("halloween"))s+=40;
    if(HOLIDAY.toLowerCase().includes("christmas")&&t.holiday.includes("christmas"))s+=40;
    if(HOLIDAY.toLowerCase().includes("thanksgiving")&&t.holiday.includes("thanksgiving"))s+=40;
    if(HOLIDAY.toLowerCase().includes("valentine")&&t.holiday.includes("valentine"))s+=40;
    if(HOLIDAY.toLowerCase().includes("new year")&&t.holiday.includes("newyear"))s+=40;
  }

  if(form.budget==="splurge"&&(t.budget||[]).some(b=>["moderate","splurge"].includes(b)))s+=25;
  if(form.budget==="open"&&(t.budget||[]).some(b=>["moderate","splurge"].includes(b)))s+=15;
  if(isWeekend&&t.dayType&&t.dayType.includes("weekend"))s+=15;
  if(t.timeOfDay&&t.timeOfDay.includes(TOD))s+=10;
  return s;
}

function pick(form,seen){
  const ranked=L.filter(a=>!seen.includes(a.n))
    .map(a=>({...a,_s:scoreAct(a,form)}))
    .sort((a,b)=>b._s-a._s);
  const top=ranked.slice(0,Math.min(6,ranked.length));
  return top[Math.floor(Math.random()*top.length)]||L[Math.floor(Math.random()*L.length)];
}

function getRichDetail(activity){
  const season=getSeason();
  if(!activity.richType) return null;

  if(activity.richType==="farmersMarket"){
    if(nearbyPlaces.farmersMarkets.length>0){
      return{title:"📍 Nearby Farmers Markets",items:nearbyPlaces.farmersMarkets.map(m=>`${m.name} — ${m.address}`)};
    }
    return{title:"🗺️ Finding Your Market",items:["Search 'farmers market near me' on Google Maps — filter by Saturday or Sunday","USDA's Local Food Portal at localfoodportal.com lists all certified markets","Local Facebook groups or Nextdoor often have the most current hours","Most markets run 8am–noon on weekend mornings — arrive early for the best selection"]};
  }

  if(activity.richType==="scavengerHunt"){
    const list=SCAVENGER_LISTS[season]||SCAVENGER_LISTS.spring;
    return{title:`🍂 Your ${season.charAt(0).toUpperCase()+season.slice(1)} Scavenger List`,items:list};
  }

  if(activity.richType==="birdWatching"){
    const birds=BIRDS_BY_SEASON[season]||BIRDS_BY_SEASON.spring;
    return{title:`🐦 Birds to Watch for This ${season.charAt(0).toUpperCase()+season.slice(1)}`,items:birds.map(b=>`${b}`).concat(["Use the free Merlin app to identify by photo or sound","eBird.org shows what's been spotted in your exact zip code recently"])};
  }

  if(activity.richType==="stargazing"){
    const sg=getStargazingDetails();
    return{title:"🔭 What to Look for Tonight",items:[sg.planets,...sg.constellations.slice(0,4),"Use Stellarium app (free) to identify anything you see","Give your eyes 20 minutes to dark-adapt — no phone screens during this time"]};
  }

  if(activity.richType==="hiking"){
    if(nearbyPlaces.trails.length>0){
      return{title:"🥾 Nearby Trails",items:nearbyPlaces.trails.map(t=>`${t.name}`).concat(["AllTrails.com has reviews, difficulty, and kid-friendliness ratings","Bring more water than you think you need — double the estimate for kids"])};
    }
    return{title:"🥾 Finding Great Trails",items:["AllTrails.com — search by distance from home, filter by 'kid-friendly'","The app rates trails easy/moderate/hard — start with easy","State park websites list all trails with maps you can download offline","Look for loops under 3 miles with under 300 feet of elevation gain for first hikes with kids"]};
  }

  if(activity.richType==="splurge"){
    const city=overrides.city||ctx.city||"";
    const q=encodeURIComponent((city?city+" ":"")+activity.searchQuery);
    const url=`https://www.google.com/search?q=${q}`;
    return{title:"📍 Find Near You",items:[`<a href="${url}" target="_blank" style="color:var(--te);font-weight:800;">Search: ${activity.searchQuery}${city?" near "+city:""} →</a>`,"Check Yelp, Google Maps, or local event listings for current options and hours","Look for family packages, memberships, or seasonal discounts","Call ahead to confirm age requirements and availability"]};
  }
  return null;
}

let step=0,result=null,seen=[],count=0;
let form={loc:"",ages:[],energy:[],mood:[],time:"",budget:""};
const AGS=[{id:"toddler",l:"Toddlers",s:"Ages 1–3",e:"🍼"},{id:"young",l:"Young Kids",s:"Ages 4–7",e:"🧸"},{id:"tween",l:"Kids",s:"Ages 8–12",e:"🎮"},{id:"teen",l:"Teens",s:"Ages 13+",e:"🎧"}];

function openOverrideModal(){
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const seasons=["spring","summer","fall","winter"];
  const weathers=[{k:"clear",l:"☀️ Clear"},{k:"cloudy",l:"⛅ Cloudy"},{k:"rainy",l:"🌧️ Rainy"},{k:"snowy",l:"❄️ Snowy"},{k:"cold",l:"🥶 Cold"},{k:"hot",l:"🥵 Hot"},{k:"windy",l:"💨 Windy"}];

  const dayChips=days.map(d=>`<button class="mchip${overrides.day===d?" sel":""}" onclick="setOverride('day','${d}')">${d}</button>`).join("");
  const seasonChips=seasons.map(s=>`<button class="mchip${overrides.season===s?" sel":""}" onclick="setOverride('season','${s}')">${SE[s]} ${s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join("");
  const weatherChips=weathers.map(w=>`<button class="mchip${overrides.weather===w.k?" sel":""}" onclick="setOverride('weather','${w.k}')">${w.l}</button>`).join("");

  document.getElementById("modal-root").innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Plan for a Different Day</h3>
      <p>Override the auto-detected context to plan ahead — "what should we do this Saturday when it's raining?"</p>
      <div class="modal-row"><div class="modal-label">Day of Week</div><div class="modal-chips">${dayChips}</div></div>
      <div class="modal-row"><div class="modal-label">Season</div><div class="modal-chips">${seasonChips}</div></div>
      <div class="modal-row"><div class="modal-label">Weather Condition</div><div class="modal-chips">${weatherChips}</div></div>
      <button class="modal-close" onclick="applyOverridesAndClose()">Apply & See Recommendations →</button>
      ${Object.values(overrides).some(v=>v!==null)?`<button onclick="clearOverrides()" style="width:100%;margin-top:10px;padding:10px;background:none;border:1.5px solid var(--sd);border-radius:11px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:var(--mu)">Clear Overrides — Use Current Conditions</button>`:""}
    </div>
  </div>`;
}

function setOverride(key,val){ overrides[key]=overrides[key]===val?null:val; openOverrideModal(); }
function closeModal(){ document.getElementById("modal-root").innerHTML=""; }
function clearOverrides(){ overrides={day:null,weather:null,season:null,city:null}; closeModal(); render(); }
function applyOverridesAndClose(){ closeModal(); render(); }

function render(){
  const app=document.getElementById("app");
  const dots=[0,1,2,3,4,5].map(i=>`<span class="dot${i===step?" active":i<step?" done":""}"></span>`).join("");
  let body="";
  const season=getSeason();
  const day=getDay();
  const isWeekend=getIsWeekend();
  const wLabel=getWeatherLabel();
  const hasOverrides=Object.values(overrides).some(v=>v!==null);

  if(step<6){
    let pills=`<span class="pill">${SE[season]} ${season}${overrides.season?" ✏️":""}</span><span class="pill">${TE[TOD]} ${TOD}</span><span class="pill editable" onclick="openOverrideModal()" title="Change day">📅 ${day}${overrides.day?" ✏️":""}</span>`;
    if(HOLIDAY) pills+=`<span class="pill holiday">${HOLIDAY}</span>`;
    if(isWeekend) pills+=`<span class="pill">🎉 Weekend</span>`;
    if(!ctx.loaded) pills+=`<span class="pill loading">📍 Getting weather...</span>`;
    else if(wLabel) pills+=`<span class="pill weather editable" onclick="openOverrideModal()" title="Change weather">${wLabel}</span>`;
    const cityDisplay=overrides.city||ctx.city;
    if(cityDisplay) pills+=`<span class="pill weather">📍 ${cityDisplay}</span>`;

    body+=`<div class="hdr"><div class="badge">💛 Family Time</div><h1>Connect with your <em>kids</em></h1><p>${L.length}+ activities → your perfect moment</p></div>
    <div class="ctx">${pills}</div>
    <div class="override-hint">Planning ahead? <span onclick="openOverrideModal()">Change day or weather →</span></div>
    <div class="prog">${dots}</div><div class="card">`;

    const back=step>0?`<button class="back" onclick="prevStep()">← Back</button>`:"";

    if(step===0){
      body+=`<div class="stag">Step 1 of 6</div><h2>Where will you be?</h2><p class="sub">Pick your setting</p>
      <div class="og">
        <button class="oc${form.loc==="outside"?" sel":""}" onclick="setF('loc','outside',1)"><span class="oe">🌳</span><span class="ol">Outside</span><span class="os">Backyard, park, neighborhood</span></button>
        <button class="oc${form.loc==="inside"?" sel":""}" onclick="setF('loc','inside',1)"><span class="oe">🏠</span><span class="ol">Inside</span><span class="os">Home, living room, kitchen</span></button>
        <button class="oc${form.loc==="both"?" sel":""}" onclick="setF('loc','both',1)"><span class="oe">🔄</span><span class="ol">Either works</span><span class="os">No preference</span></button>
      </div>`;
    } else if(step===1){
      body+=`<div class="stag">Step 2 of 6</div><h2>How much time?</h2><p class="sub">We'll match the activity to your window</p>
      <div class="og">
        <button class="oc${form.time==="15-20 minutes"?" sel":""}" onclick="setF('time','15-20 minutes',2)"><span class="oe">⚡</span><span class="ol">15–20 min</span><span class="os">Quick spark</span></button>
        <button class="oc${form.time==="30-45 minutes"?" sel":""}" onclick="setF('time','30-45 minutes',2)"><span class="oe">🕐</span><span class="ol">30–45 min</span><span class="os">Good stretch</span></button>
        <button class="oc${form.time==="1 hour"?" sel":""}" onclick="setF('time','1 hour',2)"><span class="oe">🕑</span><span class="ol">~1 hour</span><span class="os">Quality time</span></button>
        <button class="oc${form.time==="2+ hours"?" sel":""}" onclick="setF('time','2+ hours',2)"><span class="oe">🌟</span><span class="ol">2+ hours</span><span class="os">Full adventure</span></button>
      </div>
      <div class="nav">${back}</div>`;
    } else if(step===2){
      const btns=AGS.map(a=>`<button class="oc${form.ages.includes(a.id)?" sel":""}" onclick="toggleArr('ages','${a.id}')"><span class="oe">${a.e}</span><span class="ol">${a.l}</span><span class="os">${a.s}</span></button>`).join("");
      body+=`<div class="stag">Step 3 of 6</div><h2>How old are your kids?</h2><p class="sub">Select all that apply</p>
      <div class="og">${btns}</div>
      <div class="nav">${back}<button class="nb" onclick="nextStep(3)" ${form.ages.length===0?"disabled":""}>Continue →</button></div>`;
    } else if(step===3){
      body+=`<div class="stag">Step 4 of 6</div><h2>Your energy level?</h2><p class="sub">Select all that apply</p>
      <div class="og">
        <button class="oc${form.energy.includes("low")?" sel":""}" onclick="toggleArr('energy','low')"><span class="oe">😴</span><span class="ol">Low key</span><span class="os">I'm a bit tired</span></button>
        <button class="oc${form.energy.includes("medium")?" sel":""}" onclick="toggleArr('energy','medium')"><span class="oe">😊</span><span class="ol">Moderate</span><span class="os">Ready to engage</span></button>
        <button class="oc${form.energy.includes("high")?" sel":""}" onclick="toggleArr('energy','high')"><span class="oe">🚀</span><span class="ol">Energized</span><span class="os">Let's go!</span></button>
      </div>
      <div class="nav">${back}<button class="nb" onclick="nextStep(4)" ${form.energy.length===0?"disabled":""}>Continue →</button></div>`;
    } else if(step===4){
      body+=`<div class="stag">Step 5 of 6</div><h2>What kind of moment?</h2><p class="sub">Select all that apply</p>
      <div class="og">
        <button class="oc${form.mood.includes("silly")?" sel":""}" onclick="toggleArr('mood','silly')"><span class="oe">😂</span><span class="ol">Silly & Fun</span><span class="os">Laughing together</span></button>
        <button class="oc${form.mood.includes("calm")?" sel":""}" onclick="toggleArr('mood','calm')"><span class="oe">🤗</span><span class="ol">Calm & Close</span><span class="os">Quiet bonding</span></button>
        <button class="oc${form.mood.includes("learning")?" sel":""}" onclick="toggleArr('mood','learning')"><span class="oe">🧠</span><span class="ol">Learn Together</span><span class="os">Creative & curious</span></button>
        <button class="oc${form.mood.includes("active")?" sel":""}" onclick="toggleArr('mood','active')"><span class="oe">🏃</span><span class="ol">Active</span><span class="os">Move & play</span></button>
      </div>
      <div class="nav">${back}<button class="nb" onclick="nextStep(5)" ${form.mood.length===0?"disabled":""}>Continue →</button></div>`;
    } else if(step===5){
      body+=`<div class="stag">Step 6 of 6</div><h2>Any budget in mind?</h2><p class="sub">Great activities exist at every level</p>
      <div class="og">
        <button class="oc${form.budget==="free"?" sel":""}" onclick="setF('budget','free',99)"><span class="oe">🆓</span><span class="ol">Free</span><span class="os">No spend needed</span></button>
        <button class="oc${form.budget==="small"?" sel":""}" onclick="setF('budget','small',99)"><span class="oe">💵</span><span class="ol">A Little</span><span class="os">Under $50</span></button>
        <button class="oc${form.budget==="splurge"?" sel":""}" onclick="setF('budget','splurge',99)"><span class="oe">✨</span><span class="ol">Splurge</span><span class="os">$50+, worth it</span></button>
        <button class="oc${form.budget==="open"?" sel":""}" onclick="setF('budget','open',99)"><span class="oe">🎯</span><span class="ol">Any</span><span class="os">Whatever fits</span></button>
      </div>
      <div class="nav">${back}</div>`;
    }
    body+=`</div>`;

  } else if(step===6&&result){
    let ctxbar=`${day} • ${TOD} • ${SE[season]} ${season}`;
    if(wLabel) ctxbar+=` • ${wLabel}`;
    if(HOLIDAY) ctxbar+=` • ${HOLIDAY}`;
    if(hasOverrides) ctxbar+=` • ✏️ Planning mode`;

    const steps=result.s.map((x,i)=>`<li><span class="sn">${i+1}</span><span>${x}</span></li>`).join("");
    const needs=result.n2.map(x=>`<span class="tg">${x}</span>`).join("");
    const twist=result.twist?`<div class="sec"><div class="st">🌟 Bonus Twist</div><div class="bb">${result.twist}</div></div>`:"";
    const cntbadge=count>1?`<div class="cb">#${count}</div>`:"";

    const rich=getRichDetail(result);
    const richHtml=rich?`<div class="sec rich-sec"><div class="st">${rich.title}</div><ul class="rich-list">${rich.items.map(item=>`<li><span class="rich-dot"></span><span>${item}</span></li>`).join("")}</ul></div>`:"";

    body+=`
    <div class="hero">
      ${cntbadge}
      <div class="ht">✨ Your Activity</div>
      <h2>${result.n}</h2>
      <div class="htl">${result.t}</div>
      <div class="hm"><span class="chip">⚡ ${result.e} energy</span></div>
      <div class="ctx-bar">${ctxbar}</div>
    </div>
    <div class="secs">
      <div class="sec"><div class="st">💬 Why This Works</div><p class="wt">${result.w}</p></div>
      <div class="sec"><div class="st">📋 How To Do It</div><ul class="sl">${steps}</ul></div>
      ${richHtml}
      <div class="sec"><div class="st">🎒 What You'll Need</div><div class="tgs">${needs}</div></div>
      <div class="sec"><div class="st">❤️ Connection Tip</div><div class="tb">${result.tip}</div></div>
      ${twist}
    </div>
    <div class="acts">
      <button class="bp" onclick="resetApp()">🔄 Start Over</button>
      <button class="bs" onclick="tryAnother()">✨ Try Another</button>
    </div>`;
  }

  app.innerHTML=body;
}

function setF(k,v,nextS){
  form[k]=v; render();
  if(nextS===99){setTimeout(showResult,260);}
  else if(nextS){setTimeout(()=>{step=nextS;render();},260);}
}
function toggleArr(k,v){ form[k]=form[k].includes(v)?form[k].filter(x=>x!==v):[...form[k],v]; render(); }
function nextStep(n){step=n;render();}
function prevStep(){step=Math.max(0,step-1);render();window.scrollTo(0,0);}
function showResult(){
  result=pick(form,seen); seen=[...seen,result.n]; count++; step=6; render(); window.scrollTo(0,0);
}
function tryAnother(){
  if(seen.length>=L.length)seen=[];
  result=pick(form,seen); seen=[...seen,result.n]; count++; render(); window.scrollTo(0,0);
}
function resetApp(){
  step=0;result=null;seen=[];count=0;
  form={loc:"",ages:[],energy:[],mood:[],time:"",budget:""};
  render();window.scrollTo(0,0);
}

render();
loadContext();
</script>
</body>
</html>
