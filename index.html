<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Family Time">
    <title>Family Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fraunces:ital,wght@0,700;1,300&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--cr:#fdf8f2;--wm:#f5efe6;--sd:#e8d9c5;--te:#c96a3c;--ru:#a8522a;--fo:#3d6b4f;--go:#d4a843;--ink:#2a1f14;--mu:#7a6a5a;--sh:0 4px 20px rgba(42,31,20,.1)}
        body{background:var(--cr);font-family:'Nunito',sans-serif;color:var(--ink);min-height:100vh;-webkit-tap-highlight-color:transparent}
        #app{max-width:640px;margin:0 auto;padding:24px 16px 80px}
        .hdr{text-align:center;margin-bottom:20px}
        .badge{display:inline-flex;align-items:center;gap:5px;background:var(--fo);color:#fff;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:20px;margin-bottom:10px}
        .hdr h1{font-family:'Fraunces',serif;font-size:clamp(1.7rem,6vw,2.4rem);font-weight:700;line-height:1.15}
        .hdr h1 em{font-style:italic;color:var(--te)}
        .hdr p{color:var(--mu);font-size:13px;margin-top:6px}
        .ctx{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
        .pill{background:var(--wm);border:1.5px solid var(--sd);border-radius:30px;padding:5px 11px;font-size:12px;font-weight:700;color:var(--mu)}
        .pill.weather{background:#e8f4fd;border-color:#b3d9f5;color:#1a6fa8}
        .pill.holiday{background:#fff0e8;border-color:#ffc9a0;color:#a85a1a}
        .pill.loading{opacity:.6;font-style:italic}
        .prog{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
        .dot{width:9px;height:9px;border-radius:50%;background:var(--sd);transition:all .3s;display:inline-block}
        .dot.active{background:var(--te);transform:scale(1.35)}
        .dot.done{background:var(--fo)}
        .card{background:#fff;border-radius:22px;padding:24px 20px;box-shadow:var(--sh)}
        .stag{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--te);margin-bottom:4px}
        .card h2{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:700}
        .sub{color:var(--mu);font-size:13px;margin-top:3px;margin-bottom:16px}
        .og{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px}
        .oc{background:var(--wm);border:2px solid var(--sd);border-radius:15px;padding:13px 9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .18s;text-align:center;font-family:'Nunito',sans-serif;width:100%;-webkit-appearance:none; border: 2px solid var(--sd); }
        .oc.sel{background:var(--te);border-color:var(--te);color:#fff;box-shadow:0 6px 18px rgba(201,106,60,.3)}
        .oc.sel .os{color:rgba(255,255,255,.8)}
        .oe{font-size:26px;line-height:1.2}.ol{font-weight:800;font-size:13px}.os{font-size:11px;color:var(--mu);font-weight:600}
        .nav{display:flex;gap:10px;margin-top:13px}
        .nav .nb{margin-top:0;flex:1}
        .nb{width:100%;margin-top:13px;background:var(--ink);color:#fff;border:none;border-radius:13px;padding:13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
        .nb:disabled{opacity:.3;cursor:default}
        .back{flex:1;background:#fff;color:var(--ink);border:2px solid var(--sd);border-radius:13px;padding:13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
        .hero{background:linear-gradient(135deg,var(--fo),#2d5040);border-radius:22px;padding:24px 20px;color:#fff;margin-bottom:12px;position:relative;overflow:hidden}
        .hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:rgba(255,255,255,.05);border-radius:50%}
        .cb{position:absolute;top:13px;right:13px;background:rgba(255,255,255,.2);border-radius:18px;padding:3px 9px;font-size:11px;font-weight:800}
        .ht{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:5px}
        .hero h2{font-family:'Fraunces',serif;font-size:clamp(1.3rem,4.5vw,1.8rem);font-weight:700;line-height:1.2;margin-bottom:5px}
        .htl{font-size:13px;color:rgba(255,255,255,.85);font-weight:700}
        .hm{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
        .chip{background:rgba(255,255,255,.18);border-radius:18px;padding:4px 11px;font-size:12px;font-weight:700}
        .ctx-bar{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;margin-top:12px;font-size:12px;color:rgba(255,255,255,.85);font-weight:600}
        .secs{display:flex;flex-direction:column;gap:11px}
        .sec{background:#fff;border-radius:17px;padding:17px;box-shadow:var(--sh)}
        .st{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--te);margin-bottom:8px}
        .wt{font-size:14px;line-height:1.68}
        .sl{list-style:none;display:flex;flex-direction:column;gap:9px;padding:0}
        .sl li{display:flex;gap:9px;align-items:flex-start;font-size:13px;line-height:1.5}
        .sn{background:var(--te);color:#fff;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px}
        .tgs{display:flex;flex-wrap:wrap;gap:6px}
        .tg{background:var(--wm);border:1.5px solid var(--sd);border-radius:18px;padding:4px 10px;font-size:12px;font-weight:700}
        .tb{background:linear-gradient(135deg,#fff8f0,#fdf0e4);border-left:4px solid var(--go);border-radius:0 11px 11px 0;padding:12px 14px;font-size:13px;line-height:1.68}
        .bb{background:linear-gradient(135deg,#f0f7f4,#e8f5ee);border-left:4px solid var(--fo);border-radius:0 11px 11px 0;padding:12px 14px;font-size:13px;line-height:1.68}
        .acts{display:flex;gap:10px;margin-top:16px}
        .bp{flex:1;background:var(--te);color:#fff;border:none;border-radius:13px;padding:13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
        .bs{flex:1;background:#fff;color:var(--ink);border:2px solid var(--sd);border-radius:13px;padding:13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
    </style>
</head>
<body>
<div id="app"></div>
<script>
// ── Context ───────────────────────────────────────────────────────────────────
const _d = new Date();
const MONTH = _d.getMonth(), HOUR = _d.getHours(), WDAY = _d.getDay();
const DAY = _d.toLocaleDateString("en-US", { weekday: "long" });
const DATE_STR = _d.toLocaleDateString("en-US", { month: "long", day: "numeric" });
const SEASON = MONTH <= 1 || MONTH === 11 ? "winter" : MONTH <= 4 ? "spring" : MONTH <= 7 ? "summer" : "fall";
const TOD = HOUR < 12 ? "morning" : HOUR < 17 ? "afternoon" : HOUR < 20 ? "evening" : "night";
const IS_WEEKEND = WDAY === 0 || WDAY === 6;
const SE = { winter: "❄️", spring: "🌸", summer: "☀️", fall: "🍂" };
const TE = { morning: "🌅", afternoon: "🌤️", evening: "🌇", night: "🌙" };

// ── Holiday Detection ─────────────────────────────────────────────────────────
function getHoliday() {
    const m = MONTH + 1, d = _d.getDate();
    const holidays = {
        "1/1": "🎆 New Year's Day", "2/14": "💝 Valentine's Day", "3/17": "🍀 St. Patrick's Day",
        "7/4": "🎇 Independence Day", "10/31": "🎃 Halloween", "11/11": "🎖️ Veterans Day",
        "12/24": "🎄 Christmas Eve", "12/25": "🎁 Christmas Day", "12/31": "🥂 New Year's Eve"
    };
    const key = `${m}/${d}`;
    if (holidays[key]) return holidays[key];
    
    // Near Christmas
    if (m === 12 && d >= 20 && d <= 23) return "🎄 Holiday Week";
    // Near Halloween
    if (m === 10 && d >= 28 && d <= 30) return "🎃 Almost Halloween";
    // Spring Break
    if (m === 3 && d >= 15 && d <= 25) return "🌸 Spring Break";
    
    return null;
}
const HOLIDAY = getHoliday();

// ── Weather & Location ────────────────────────────────────────────────────────
let ctx = { weather: null, temp: null, city: null, isRaining: false, isCold: false, isHot: false, isWindy: false, loaded: false };

async function loadContext() {
    try {
        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 6000 }));
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m&temperature_unit=fahrenheit&windspeed_unit=mph`);
        const data = await r.json();
        const c = data.current;
        const temp = Math.round(c.temperature_2m);
        const code = c.weathercode;
        const wind = c.windspeed_10m;

        const isRaining = code >= 51 && code <= 82 || code >= 95;
        const isSnowing = code >= 71 && code <= 77;
        const isCold = temp < 45;
        const isHot = temp > 88;
        const isWindy = wind > 20;
        
        let weatherLabel = isSnowing ? `❄️ Snowing ${temp}°F` : isRaining ? `🌧️ Rainy ${temp}°F` : isWindy ? `💨 Windy ${temp}°F` : isCold ? `🥶 Cold ${temp}°F` : isHot ? `🥵 Hot ${temp}°F` : `☀️ Clear ${temp}°F`;

        let city = "";
        try {
            const gr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
            const gd = await gr.json();
            city = gd.address?.city || gd.address?.town || gd.address?.suburb || "";
        } catch (e) {}

        ctx = { ...ctx, weather: weatherLabel, temp, city, isRaining, isSnowing, isCold, isHot, isWindy, loaded: true };
    } catch (e) {
        ctx.loaded = true;
    }
    render();
}

// ── Activity Library ──────────────────────────────────────────────────────────
const L = [
    { n: "Lip Sync Battle", t: "Who's the real star in this family?", w: "When you belt out a song with zero dignity, kids realize you're a real person — and love you even more for it.", s: ["Each person secretly picks a song", "Clear the living room as your stage", "Perform with full commitment", "Vote: most dramatic, best moves"], n2: ["Phone or speaker", "Hairbrush mic"], tip: "Go first and be completely over the top.", e: "high", twist: "Film it and do a watch party later.", tags: { loc: ["inside"], ages: ["young", "tween", "teen"], mood: ["silly", "active"], time: ["30-45 minutes"], budget: ["free"], weather: ["any"] } },
    { n: "Fort Building Championship", t: "Engineer the ultimate couch structure", w: "Design challenges require problem-solving. Once inside, the phones go away and you're just present.", s: ["Gather every blanket and pillow", "Build a fort big enough for everyone", "Stock it with snacks and spend time inside"], n2: ["Blankets", "Couch cushions", "Snacks"], tip: "Once inside, the fort is a phone-free zone.", e: "medium", twist: "Give the fort a name and a flag.", tags: { loc: ["inside"], ages: ["toddler", "young", "tween"], mood: ["silly", "calm"], time: ["1 hour"], budget: ["free"], weather: ["any"] } },
    { n: "Nature Scavenger Hunt", t: "Explore your own neighborhood", w: "A shared mission transforms a regular walk into an adventure.", s: ["Write 10 things to find: something yellow, a feather, a round stone", "Head out and photograph each find", "Award categories at the end"], n2: ["Paper and pen", "Phone camera"], tip: "Let kids add items to the list.", e: "medium", twist: "Only find things related to the current season.", tags: { loc: ["outside"], ages: ["toddler", "young", "tween"], mood: ["learning", "active"], time: ["45 minutes"], budget: ["free"], weather: ["clear", "cloudy"] } }
];

// ── Logic ──────────────────────────────────────────────────────────────────────
let step = 0, result = null, seen = [], count = 0;
let form = { loc: "", ages: [], energy: [], mood: [], time: "", budget: "" };
const AGS = [{ id: "toddler", l: "Toddlers", s: "Ages 1–3", e: "🍼" }, { id: "young", l: "Young Kids", s: "Ages 4–7", e: "🧸" }, { id: "tween", l: "Kids", s: "Ages 8–12", e: "🎮" }, { id: "teen", l: "Teens", s: "Ages 13+", e: "🎧" }];

function scoreAct(a, f) {
    let s = 0; const t = a.tags;
    if (t.loc.includes(f.loc)) s += 30;
    const ao = (t.ages || []).filter(x => f.ages.includes(x)).length;
    s += ao * 18;
    const mo = (t.mood || []).filter(x => f.mood.includes(x)).length;
    s += mo * 20;
    return s;
}

function pick(f, seen) {
    const ranked = L.filter(a => !seen.includes(a.n)).map(a => ({ ...a, _s: scoreAct(a, f) })).sort((a, b) => b._s - a._s);
    return ranked[0] || L[0];
}

function render() {
    const app = document.getElementById("app");
    const dots = [0, 1, 2, 3, 4, 5].map(i => `<span class="dot${i === step ? " active" : i < step ? " done" : ""}"></span>`).join("");
    let body = "";

    if (step < 6) {
        let pills = `<span class="pill">${SE[SEASON]} ${SEASON}</span><span class="pill">${TE[TOD]} ${TOD}</span>`;
        if (HOLIDAY) pills += `<span class="pill holiday">${HOLIDAY}</span>`;
        if (ctx.loaded && ctx.weather) pills += `<span class="pill weather">${ctx.weather}</span>`;

        body = `<div class="hdr"><div class="badge">💛 Family Time</div><h1>Connect with your <em>kids</em></h1><p>6 quick questions → your perfect activity</p></div>
                <div class="ctx">${pills}</div>
                <div class="prog">${dots}</div><div class="card">`;

        if (step === 0) {
            body += `<div class="stag">Step 1 of 6</div><h2>Where will you be?</h2>
                    <div class="og">
                        <button class="oc ${form.loc === 'outside' ? 'sel' : ''}" onclick="setF('loc','outside',1)"><span class="oe">🌳</span><span class="ol">Outside</span></button>
                        <button class="oc ${form.loc === 'inside' ? 'sel' : ''}" onclick="setF('loc','inside',1)"><span class="oe">🏠</span><span class="ol">Inside</span></button>
                        <button class="oc ${form.loc === 'both' ? 'sel' : ''}" onclick="setF('loc','both',1)"><span class="oe">🔄</span><span class="ol">Either</span></button>
                    </div>`;
        } else if (step === 1) {
            body += `<div class="stag">Step 2 of 6</div><h2>How much time?</h2>
                    <div class="og">
                        <button class="oc ${form.time === '30-45 minutes' ? 'sel' : ''}" onclick="setF('time','30-45 minutes',2)"><span class="oe">🕐</span><span class="ol">30–45 min</span></button>
                        <button class="oc ${form.time === '1 hour' ? 'sel' : ''}" onclick="setF('time','1 hour',2)"><span class="oe">🕑</span><span class="ol">~1 hour</span></button>
                    </div>`;
        } else if (step === 2) {
            const btns = AGS.map(a => `<button class="oc ${form.ages.includes(a.id) ? 'sel' : ''}" onclick="toggleArr('ages','${a.id}')"><span class="oe">${a.e}</span><span class="ol">${a.l}</span></button>`).join("");
            body += `<div class="stag">Step 3 of 6</div><h2>How old are your kids?</h2><div class="og">${btns}</div>
                    <div class="nav"><button class="nb" onclick="nextStep(3)">Continue →</button></div>`;
        } else {
            body += `<h2>Finalizing...</h2><button class="nb" onclick="showResult()">Get Result</button>`;
        }
        body += `</div>`;
    } else {
        body = `<div class="hero"><h2>${result.n}</h2><p>${result.t}</p></div>
                <div class="secs"><div class="sec"><div class="st">📋 Steps</div><ul class="sl">${result.s.map(x => `<li>${x}</li>`).join("")}</ul></div></div>
                <button class="bp" onclick="resetApp()">Start Over</button>`;
    }
    app.innerHTML = body;
}

function setF(k, v, nextS) { form[k] = v; step = nextS; render(); }
function toggleArr(k, v) { form[k] = form[k].includes(v) ? form[k].filter(x => x !== v) : [...form[k], v]; render(); }
function nextStep(n) { step = n; render(); }
function showResult() { result = pick(form, seen); seen.push(result.n); step = 6; render(); }
function resetApp() { step = 0; result = null; form = { loc: "", ages: [], energy: [], mood: [], time: "", budget: "" }; render(); }

render();
loadContext();
</script>
</body>
</html>
